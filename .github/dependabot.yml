version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    labels:
      - "npm"
      - "dependencies"
    groups:
      all-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "🧹 chore"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    labels:
      - "github-actions"
      - "dependencies"
    groups:
      all-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "🔧 ci"
      include: "scope"

  - package-ecosystem: "terraform"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    labels:
      - "terraform"
      - "dependencies"
    groups:
      all-providers:
        patterns:
          - "*"
    commit-message:
      prefix: "🏗️ infra"
      include: "scope"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    labels:
      - "docker"
      - "dependencies"
    groups:
      all-images:
        patterns:
          - "*"
    commit-message:
      prefix: "🐳 docker"
      include: "scope"

  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    labels:
      - "swift"
      - "dependencies"
    groups:
      all-packages:
        patterns:
          - "*"
    commit-message:
      prefix: "🧹 chore"
      include: "scope"
